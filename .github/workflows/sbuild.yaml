name: Sourcebuild

on:
  workflow_dispatch:
    inputs:
      linux:
        type: boolean
        default: true
      macos:
        type: boolean
        default: true
      windows:
        type: boolean
        default: true
      android:
        type: boolean
        default: true
      testtargets:
        type: boolean
        default: false
      py_ver:
        type: string
        default: '3.14'

jobs:
  
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          
          - os: ubuntu-latest
            condition: ${{ inputs.linux }}
            tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          
          - os: ubuntu-latest
            condition: ${{ inputs.linux }}
            target_cpu: x86
            tag: manylinux_2_17_i686.manylinux2014_i686
          
          - os: ubuntu-latest
            condition: ${{ inputs.linux }}
            target_cpu: arm64
            tag: manylinux_2_17_aarch64.manylinux2014_aarch64
          
          - os: ubuntu-24.04-arm
            condition: ${{ inputs.linux && inputs.testtargets }}
            # if we don't use the sysroot or an older container, the glibc requirement is high
            tag: manylinux_2_39_aarch64
          
          - os: ubuntu-latest
            condition: ${{ inputs.linux }}
            target_cpu: arm
            tag: manylinux_2_17_armv7l.manylinux2014_armv7l
          
          - os: ubuntu-latest
            condition: ${{ inputs.linux }}
            target_cpu: ppc64
            tag: manylinux_2_17_ppc64le.manylinux2014_ppc64le
          
          - os: macos-latest  # arm64 host
            condition: ${{ inputs.macos }}
            target_cpu: x64
            tag: macosx_11_0_x86_64
          
          - os: macos-latest
            condition: ${{ inputs.macos }}
            tag: macosx_11_0_arm64
          
          # test macOS the other way round while we still can
          - os: macos-15-intel
            condition: ${{ inputs.macos && inputs.testtargets }}
            tag: macosx_11_0_x86_64
          
          - os: macos-15-intel
            condition: ${{ inputs.macos && inputs.testtargets }}
            target_cpu: arm64
            tag: macosx_11_0_arm64
          
          - os: windows-latest  # amd64
            condition: ${{ inputs.windows }}
          
          - os: windows-latest
            condition: ${{ inputs.windows }}
            target_cpu: arm64
            tag: win_arm64
          
          - os: windows-latest
            condition: ${{ inputs.windows }}
            target_cpu: x86
            tag: win32
          
          - os: windows-11-arm
            condition: ${{ inputs.windows && inputs.testtargets }}
          
          - os: ubuntu-latest
            condition: ${{ inputs.android }}
            target_os: android
            target_cpu: arm64
            tag: android_21_arm64_v8a
          
          - os: ubuntu-latest
            condition: ${{ inputs.android }}
            target_os: android
            target_cpu: arm
            tag: android_21_armeabi_v7a
    
    uses: ./.github/workflows/sbuild_one.yaml
    with:
      os: ${{ matrix.os }}
      condition: ${{ matrix.condition }}
      target_cpu: ${{ matrix.target_cpu }}
      target_os: ${{ matrix.target_os }}
      tag: ${{ matrix.tag }}
      py_ver: ${{ inputs.py_ver }}
