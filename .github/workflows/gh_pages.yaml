name: Update Docs (GH Pages)

on:
  workflow_call:
    inputs: &reusable_inputs
      publish:
        type: boolean
        default: false
  workflow_dispatch:
    inputs: *reusable_inputs
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - docs/**
  #     - src/**
  #     - README.md

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions: {}

jobs:
  
  build:
    runs-on: ubuntu-26.04
    
    steps:
      
      - name: Check out pypdfium2 (deep)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # for git describe in conf.py
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.14'
          pip-install: -r req/docs.txt
      
      - name: Install pypdfium2
        run: python3 -m pip install -v .
      
      - name: Build documentation
        run: python3 -m sphinx -b html docs/source docs/build/html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: 'docs/build/html'
  
  publish:
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-26.04
    
    # Set permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
