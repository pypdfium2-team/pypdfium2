name: PBIN one
on:
  workflow_call:
    inputs: &reusable_inputs
      runner_os:
        type: string
        required: true
      pbin_target:
        type: string
        default: ''
      py_ver:
        type: string
        default: '3.14'
      pdfium_ver:
        type: string
        default: 'latest'
      test_on_host:
        type: boolean
        default: true
      mac_emulate_intel:
        type: boolean
        default: false
      branch:
        type: string
        default: ''
      repo_tag:
        type: string
        default: ''
  workflow_dispatch:
    inputs: *reusable_inputs

defaults:
  run:
    shell: bash

jobs:
  
  build:
    name: ${{ inputs.pbin_target }} on ${{ inputs.runner_os }}
    runs-on: ${{ inputs.runner_os }}
    
    steps:
      
      - name: Check out pypdfium2 (deep)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # for git describe
          persist-credentials: false
          ref: ${{ inputs.branch || github.ref_name }}
      
      - name: Create pypdfium2 tag (optional)
        if: ${{ inputs.repo_tag }}
        run: ./utils/auth_and_tag.sh "$REPO_TAG"
        env:
          REPO_TAG: ${{ inputs.repo_tag }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_ver }}
          pip-install: -U -r req/setup.txt -r req/test.txt
      
      - name: Build wheel
        run: python3 -m build -wxn
        env:
          PDFIUM_PLATFORM: "${{ inputs.pbin_target }}:${{ inputs.pdfium_ver }}"
      
      - name: Test wheel on host
        if: ${{ inputs.test_on_host }}
        run: |
          python3 -m pip install dist/*.whl
          python3 -m pytest tests/ -sv
      
      - name: macOS - Test x86_64 under emulation
        if: ${{ startsWith(inputs.runner_os, 'macos-') && inputs.mac_emulate_intel }}
        run: |
          # assuming python is universal (it should be)
          arch -x86_64 python3 -m venv testenv
          PYTHON="arch -x86_64 ./testenv/bin/python3"
          $PYTHON -c "import platform as p; print(p.machine())"
          $PYTHON -m pip install dist/*.whl
          $PYTHON -m pip install -U -r req/test.txt
          $PYTHON -m pytest tests/ -sv
      
      - name: Linux - Set up QEMU (if needed)
        if: ${{ startsWith(inputs.pbin_target, 'linux_') && !inputs.test_on_host }}
        uses: docker/setup-qemu-action@v4
      
      - name: Linux - Test wheel in docker
        if: ${{ startsWith(inputs.pbin_target, 'linux_') }}
        run: ./utils/call_container_driver.sh dist/*.whl
      
      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          name: "pbin-${{ inputs.pbin_target }}"
