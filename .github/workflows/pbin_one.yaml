name: PBIN one
on:
  workflow_call:
    inputs: &reusable_inputs
      runner_os:
        type: string
        required: true
      pbin_target:
        type: string
        default: ''
      py_vers:
        type: string
        default: '3.14'
      pdfium_ver:
        type: string
        default: 'latest'
      test_on_host:
        type: boolean
        default: true
      ref:
        type: string
        default: ''
      replicate_tag:
        type: string
        default: ''
  workflow_dispatch:
    inputs: *reusable_inputs

defaults:
  run:
    shell: bash

jobs:
  
  build:
    name: ${{ inputs.pbin_target }} on ${{ inputs.runner_os }}
    runs-on: ${{ inputs.runner_os }}
    
    steps:
      
      - name: Check out pypdfium2 (deep)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # for git describe
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref_name }}
      
      - name: Prepare
        uses: ./.github/actions/prepare_one
        with:
          replicate_tag: ${{ inputs.replicate_tag }}
          py_vers: ${{ inputs.py_vers }}
          py_arch: ${{ inputs.pbin_target == 'windows_x86' && 'x86' || '' }}
          pip_install: -U -r req/setup.txt
      
      - name: Build wheel
        run: python3 -m build -wxn
        env:
          PDFIUM_PLATFORM: "${{ inputs.pbin_target }}:${{ inputs.pdfium_ver }}"
      
      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          name: "pbin-${{ inputs.pbin_target }}"
      
      - name: Test wheel
        uses: ./.github/actions/test_one
        # https://github.com/actions/runner/issues/2238 ...
        with:
          runner_os: ${{ inputs.runner_os }}
          py_vers: ${{ inputs.py_vers }}
          test_on_host: ${{ inputs.test_on_host || '' }}
          docker: ${{ !startsWith(inputs.pbin_target, 'android_') || '' }}
          auditwheel: ${{ !startsWith(inputs.pbin_target, 'linux_mips') || '' }}
          windows_32bit: ${{ inputs.pbin_target == 'windows_x86' || '' }}
          mac_emulate_intel: ${{ inputs.pbin_target == 'darwin_univ2' || (startsWith(inputs.pbin_target, 'darwin_') && !inputs.test_on_host) || '' }}
          dll_glob: ${{ format('data/{0}/*pdfium.*', inputs.pbin_target) }}
