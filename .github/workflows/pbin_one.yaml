name: PBIN one
on:
  workflow_call:
    inputs: &reusable_inputs
      runner_os:
        type: string
        required: true
      pbin_target:
        type: string
        default: ''
      py_ver:
        type: string
        default: '3.14'
      pdfium_ver:
        type: string
        default: 'latest'
      test_on_host:
        type: boolean
        default: true
      branch:
        type: string
        default: ''
      repo_tag:
        type: string
        default: ''
  workflow_dispatch:
    inputs: *reusable_inputs

defaults:
  run:
    shell: bash

jobs:
  
  build:
    name: ${{ inputs.pbin_target }} on ${{ inputs.runner_os }}
    runs-on: ${{ inputs.runner_os }}
    
    steps:
      
      - name: Check out pypdfium2 (deep)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # for git describe
          persist-credentials: false
          ref: ${{ inputs.branch || github.ref_name }}
      
      - name: Create pypdfium2 tag (optional)
        if: ${{ inputs.repo_tag }}
        run: ./utils/auth_and_tag.sh "$REPO_TAG"
        env:
          REPO_TAG: ${{ inputs.repo_tag }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_ver }}
          pip-install: -U -r req/setup.txt
      
      - name: Build wheel
        run: python3 -m build -wxn
        env:
          PDFIUM_PLATFORM: "${{ inputs.pbin_target }}:${{ inputs.pdfium_ver }}"
      
      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          name: "pbin-${{ inputs.pbin_target }}"
      
      - name: Test wheel
        uses: ./.github/actions/test_one
        # https://github.com/actions/runner/issues/2238 :angry:
        with:
          runner_os: ${{ inputs.runner_os }}
          py_vers: ${{ inputs.py_ver }}
          test_on_host: ${{ inputs.test_on_host || '' }}
          mac_universal: ${{ inputs.pbin_target == 'darwin_univ2' || '' }}
          dll_glob: ${{ format('./data/{0}/*pdfium.*', inputs.pbin_target) }}
