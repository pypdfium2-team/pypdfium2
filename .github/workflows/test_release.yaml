name: Test PyPI Release
on:
  workflow_dispatch:
    inputs:
      index_url:
        type: choice
        default: 'https://pypi.org/simple'
        options:
          - 'https://pypi.org/simple'
          - 'https://test.pypi.org/simple'

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  test-release:
    permissions:
      contents: read  # recommended by checkout and setup-python actions
    strategy:
      fail-fast: false
      matrix:
        # stick with ubuntu-24.04 for now so we can keep testing python 3.8
        os: ['ubuntu-24.04', 'ubuntu-24.04-arm', 'macos-15-intel', 'macos-latest', 'windows-latest', 'windows-11-arm']
        py: ['3.8', '3.11', '3.14']  # '3.9', '3.10', '3.12', '3.13',
        exclude:
          # not supported by setup-python action
          - os: windows-11-arm
            py: '3.8'
          # - os: windows-11-arm
          #   py: '3.9'
          # - os: windows-11-arm
          #   py: '3.10'
    
    runs-on: ${{ matrix.os }}
    steps:
      
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.py }}
      
      - name: Install pypdfium2 from package index
        run: |
          python3 -m pip install -U pip
          python3 -m pip install -U --pre pypdfium2 --index-url "$INDEX_URL"
        env:
          INDEX_URL: ${{ inputs.index_url }}
      
      - name: Get pypdfium2 version
        id: version
        run: python3 -c "from pypdfium2.version import *; print(f'version={PYPDFIUM_INFO.tag}')" >> $GITHUB_OUTPUT
      
      - name: Check out pypdfium2 ${{ steps.version.outputs.version }} (shallow)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ steps.version.outputs.version }}
      
      - name: Install/update deps
        run: python3 -m pip install -U -r req/converters.txt -r req/test.txt
      
      - name: Run tests
        run: python3 -m pytest tests/
