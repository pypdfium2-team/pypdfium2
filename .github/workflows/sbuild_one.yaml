name: SBLD one

on:
  workflow_call:
    inputs: &reusable_inputs
      os:
        type: string
        required: true
      py_ver:
        type: string
        default: '3.14'
      pdfium_ver:
        type: string
        default: ''
      target_cpu:
        type: string
        default: ''
      target_os:
        type: string
        default: ''
      build_params:
        type: string
        default: ''
      custom_clang:
        type: boolean
        default: false
      tag:
        type: string
        default: ''
      branch:
        type: string
        default: ''
      repo_tag:
        type: string
        default: ''
  workflow_dispatch:
    inputs: *reusable_inputs

defaults:
  run:
    shell: bash

jobs:
  
  build:
    runs-on: ${{ inputs.os }}
    
    steps:
      
      - name: Check out pypdfium2 (deep)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # for git describe
          persist-credentials: false
          ref: ${{ inputs.branch || github.ref_name }}
      
      - name: Create pypdfium2 tag (optional)
        if: ${{ inputs.repo_tag }}
        run: ./utils/auth_and_tag.sh "$REPO_TAG"
        env:
          REPO_TAG: ${{ inputs.repo_tag }}
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_ver }}
          pip-install: -U -r req/setup.txt
      
      - name: Install custom clang
        if: ${{ inputs.custom_clang }}
        run: bash ./utils/install-static-clang.sh -m install-only
      
      - name: Update package list
        if: ${{ startsWith(inputs.os, 'ubuntu') && (inputs.target_cpu || endsWith(inputs.os, '-arm')) }}
        run: sudo apt-get update
      
      - name: Install Linux/Android cross deps
        if: ${{ startsWith(inputs.os, 'ubuntu') && inputs.target_cpu }}
        run: |
          PACKAGES=$(python3 ./utils/get_cross_deps.py $TARGET_CPU $RUNNER_OS)
          echo $PACKAGES; sudo apt-get install -y $PACKAGES
          ls -l /usr/bin |grep -E '\-(gcc|g\+\+|ar|nm|readelf)(-[0-9.]+)?$'
        env:
          RUNNER_OS: ${{ inputs.os }}
          TARGET_CPU: ${{ inputs.target_cpu }}
      
      - name: Install Linux native deps  # fallback
        if: ${{ startsWith(inputs.os, 'ubuntu') && endsWith(inputs.os, '-arm') }}
        run: |
          sudo apt-get install -y ninja-build  # generate-ninja
          python3 -m pip install -r req/gn.txt
          #python3 -c "from gn_dist import GN; print(str(GN.parent))" >> $GITHUB_PATH
      
      # GHA windows-2025 image Windows SDK is incomplete, lacks "Debugging Tools for Windows" feature requested by PDFium's build system for the cross targets. So we're using this action to install the SDK properly.
      - name: Install Windows cross deps
        if: ${{ startsWith(inputs.os, 'windows') && !endsWith(inputs.os, '-arm') && inputs.target_cpu }}
        uses: ChristopheLav/windows-sdk-install@aceebd61475568479ce68465d0849f5de9a0bfe9  # v1.0.5
        with:
          version-sdk: 26100
          features: 'OptionId.WindowsDesktopDebuggers'
      
      - name: Build PDFium (toolchained)
        run: python3 ./setupsrc/build_toolchained.py $VERSION_PARAM $CPU_PARAM $OS_PARAM $GCC_PARAM $BUILD_PARAMS
        env:
          VERSION_PARAM: ${{ inputs.pdfium_ver && format('--version {0}', inputs.pdfium_ver) }}
          CPU_PARAM: ${{ inputs.target_cpu && format('--target-cpu {0}', inputs.target_cpu) }}
          OS_PARAM: ${{ inputs.target_os && format('--target-os {0}', inputs.target_os) }}
          BUILD_PARAMS: ${{ inputs.build_params }}
      
      - name: Show binary info
        run: shopt -s nullglob; file ./data/sourcebuild/*.{so,dylib,dll}
      
      - name: Build wheel
        run: python3 -m build -wxn
        env:
          PDFIUM_PLATFORM: sourcebuild
          CROSS_TAG: ${{ inputs.tag }}  # optional
      
      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist/*.whl
          name: sbuild_${{ inputs.target_os || inputs.os }}${{ inputs.target_cpu && format('_{0}', inputs.target_cpu) }}
      
      - name: Test wheel
        uses: ./.github/actions/test_one
        if: ${{ !inputs.target_os }}
        # https://github.com/actions/runner/issues/2238 ...
        with:
          runner_os: ${{ inputs.os }}
          py_vers: ${{ inputs.py_ver }}
          test_on_host: ${{ !inputs.target_cpu || '' }}
          docker: ${{ inputs.target_cpu != 'mipsel' || '' }}
          docker_ignore_error: ${{ inputs.target_cpu == 'mips64el' || '' }}
          auditwheel: ${{ !startsWith(inputs.target_cpu, 'mips') || '' }}
          dll_glob: './data/sourcebuild/*pdfium.*'
