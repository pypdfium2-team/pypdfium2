name: SBLD one

on:
  workflow_call:
    inputs: &reusable_inputs
      os:
        type: string
        required: true
      py_ver:
        type: string
        default: '3.14'
      pdfium_ver:
        type: string
        default: ''
      target_cpu:
        type: string
        default: ''
      target_os:
        type: string
        default: ''
      build_params:
        type: string
        default: ''
      prefer_gcc:
        type: boolean
        default: false
      custom_clang:
        type: boolean
        default: false
      docker_test:
        type: boolean
        default: true
      tag:
        type: string
        default: ''
      branch:
        type: string
        default: ''
      repo_tag:
        type: string
        default: ''
  workflow_dispatch:
    inputs: *reusable_inputs

defaults:
  run:
    shell: bash

jobs:
  
  build:
    runs-on: ${{ inputs.os }}
    
    steps:
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.py_ver }}
      
      - name: Check out pypdfium2 repository
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          persist-credentials: false
          fetch-depth: 0  # for git describe
          ref: ${{ inputs.branch || github.ref_name }}
      
      - name: Create pypdfium2 tag (optional)
        if: ${{ inputs.repo_tag }}
        run: |
          git config user.email "geisserml@gmail.com"
          git config user.name "geisserml"
          git tag -a "$REPO_TAG" -m "Autorelease"
        env:
          REPO_TAG: ${{ inputs.repo_tag }}
      
      - name: Install Python deps
        run: |
          python3 -m pip install -U pip
          python3 -m pip install -U -r req/setup.txt -r req/test.txt
      
      - name: Install custom clang
        if: ${{ inputs.custom_clang }}
        run: bash ./utils/install-static-clang.sh -m install-only
      
      - name: Update package list
        if: ${{ startsWith(inputs.os, 'ubuntu') && (inputs.target_cpu || endsWith(inputs.os, '-arm')) }}
        run: sudo apt-get update
      
      - name: Install Linux/Android cross deps
        if: ${{ startsWith(inputs.os, 'ubuntu') && inputs.target_cpu }}
        run: |
          PACKAGES=$(python3 ./utils/get_cross_deps.py $TARGET_CPU $RUNNER_OS)
          echo $PACKAGES; sudo apt-get install -y $PACKAGES
          ls -l /usr/bin |grep -E '\-(gcc|g\+\+|ar|nm|readelf)(-[0-9.]+)?$'
        env:
          RUNNER_OS: ${{ inputs.os }}
          TARGET_CPU: ${{ inputs.target_cpu }}
      
      # TODO handle platforms other than ppc64, delegate to a script
      - name: Create symlinks for GCC
        if: ${{ startsWith(inputs.os, 'ubuntu') && inputs.prefer_gcc && inputs.target_cpu == 'ppc64' }}
        run: |
          sudo ln -s /usr/bin/powerpc64le-linux-gnu-g++-16 /usr/local/bin/powerpc64le-linux-gnu-g++
          sudo ln -s /usr/bin/powerpc64le-linux-gnu-gcc-16 /usr/local/bin/powerpc64le-linux-gnu-gcc
      
      - name: Install Linux native deps  # fallback
        if: ${{ startsWith(inputs.os, 'ubuntu') && endsWith(inputs.os, '-arm') }}
        run: |
          sudo apt-get install -y ninja-build  # generate-ninja
          python3 -m pip install -r req/gn.txt
          #python3 -c "from gn_dist import GN; print(str(GN.parent))" >> $GITHUB_PATH
      
      # GHA windows-2025 image Windows SDK is incomplete, lacks "Debugging Tools for Windows" feature requested by PDFium's build system for the cross targets. So we're using this action to install the SDK properly.
      - name: Install Windows cross deps
        if: ${{ startsWith(inputs.os, 'windows') && !endsWith(inputs.os, '-arm') && inputs.target_cpu }}
        uses: ChristopheLav/windows-sdk-install@aceebd61475568479ce68465d0849f5de9a0bfe9  # v1.0.5
        with:
          version-sdk: 26100
          features: 'OptionId.WindowsDesktopDebuggers'
      
      - name: Build PDFium (toolchained)
        run: python3 ./setupsrc/build_toolchained.py $VERSION_PARAM $CPU_PARAM $OS_PARAM $GCC_PARAM $BUILD_PARAMS
        env:
          VERSION_PARAM: ${{ inputs.pdfium_ver && format('--version {0}', inputs.pdfium_ver) }}
          CPU_PARAM: ${{ inputs.target_cpu && format('--target-cpu {0}', inputs.target_cpu) }}
          OS_PARAM: ${{ inputs.target_os && format('--target-os {0}', inputs.target_os) }}
          GCC_PARAM: ${{ inputs.prefer_gcc && '--prefer-gcc' || '' }}
          BUILD_PARAMS: ${{ inputs.build_params }}
      
      - name: Show binary info
        run: file ./data/sourcebuild/*.{so,dylib,dll}
      
      - name: Build wheel
        run: python3 -m build -wxn
        env:
          PDFIUM_PLATFORM: sourcebuild
          CROSS_TAG: ${{ inputs.tag }}  # optional
      
      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./dist/*.whl
          name: sbuild_${{ inputs.target_os || inputs.os }}${{ inputs.target_cpu && format('_{0}', inputs.target_cpu) }}
      
      - name: Test wheel on build host
        if: ${{ !(inputs.target_cpu || inputs.target_os) }}
        run: |
          python3 -m pip install ./dist/*.whl
          pypdfium2 -v
          python3 -m pytest tests/
      
      - name: Set up QEMU
        if: ${{ startsWith(inputs.os, 'ubuntu') && !inputs.target_os && inputs.target_cpu && inputs.docker_test }}
        uses: docker/setup-qemu-action@v4
      
      # q&d: extract arch from wheelname
      # FIXME: Fails if no tag is provided. Better map target_cpu to uname cpu properly?
      - name: Test wheel in docker container
        if: ${{ startsWith(inputs.os, 'ubuntu') && !inputs.target_os && inputs.docker_test }}
        continue-on-error: ${{ inputs.target_cpu == 'mips64el' }}
        run: |
          TARGET=$(ls dist/*.whl | grep -o -P 'manylinux_[\d_]+_\K.+?(?=\.)')
          echo "$TARGET"
          mkdir wheelhouse && cp dist/*.whl wheelhouse/
          python3 ./utils/container_driver.py "manylinux_${TARGET}"
      
      - name: On Linux, run auditwheel (informational)
        if: ${{ startsWith(inputs.os, 'ubuntu') && !inputs.target_os && !startsWith(inputs.target_cpu, 'mips') }}
        run: |
          python3 -m pip install -U auditwheel
          python3 -m auditwheel show dist/*.whl
      
      - name: On macOS, run vtool (informational)
        if: ${{ startsWith(inputs.os, 'macos') }}
        run: vtool -show-build ./data/sourcebuild/libpdfium.dylib
