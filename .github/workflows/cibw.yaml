name: CIBW
on:
  workflow_dispatch:
    inputs:
      cibw_py_ver:
        type: string
        default: 'cp314'
      linux_main:
        type: boolean
        default: true
      linux_fastemu:
        type: boolean
        default: true
      linux_clangcross:
        type: boolean
        default: true
      linux_glibc:
        type: boolean
        default: true
      linux_musl:
        type: boolean
        default: true
      test_pdfium:
        type: boolean
        default: true
      # we're using the toolchained build for macOS and Windows for now
      macos:
        type: boolean
        default: true
      windows:
        type: boolean
        default: true

jobs:
  
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          
          - condition: ${{ inputs.linux_main && inputs.linux_glibc }}
            os: ubuntu-latest
            cibw_os: manylinux
            cibw_arch: x86_64
          
          - condition: ${{ inputs.linux_main && inputs.linux_musl }}
            os: ubuntu-latest
            cibw_os: musllinux
            cibw_arch: x86_64
          
          - condition: ${{ inputs.linux_main && inputs.linux_glibc }}
            os: ubuntu-24.04-arm
            cibw_os: manylinux
            cibw_arch: aarch64
          
          - condition: ${{ inputs.linux_main && inputs.linux_musl }}
            os: ubuntu-24.04-arm
            cibw_os: musllinux
            cibw_arch: aarch64
          
          # ARM 32-bit emulation seems about as fast as native when using an ARM64 host. Same goes for x86_64 to i686.
          # For some reason, `uname -m` reports the armv7l container as armv8l when using an ARM64 host, but the author tested a manylinux wheel produced here on Raspberry Pi 2B (armv7l) locally, and it does seem to work.
          
          - condition: ${{ inputs.linux_fastemu && inputs.linux_glibc }}
            os: ubuntu-24.04-arm
            cibw_os: manylinux
            cibw_arch: armv7l
          
          - condition: ${{ inputs.linux_fastemu && inputs.linux_musl }}
            os: ubuntu-24.04-arm
            cibw_os: musllinux
            cibw_arch: armv7l
          
          - condition: ${{ inputs.linux_fastemu && inputs.linux_glibc }}
            os: ubuntu-latest
            cibw_os: manylinux
            cibw_arch: i686
          
          - condition: ${{ inputs.linux_fastemu && inputs.linux_musl }}
            os: ubuntu-latest
            cibw_os: musllinux
            cibw_arch: i686
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_glibc }}
            os: ubuntu-latest
            cibw_os: manylinux
            cibw_arch: ppc64le
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_musl }}
            os: ubuntu-latest
            cibw_os: musllinux
            cibw_arch: ppc64le
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_glibc }}
            os: ubuntu-latest
            cibw_os: manylinux
            cibw_arch: s390x
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_musl }}
            os: ubuntu-latest
            cibw_os: musllinux
            cibw_arch: s390x
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_glibc }}
            os: ubuntu-latest
            cibw_os: manylinux
            cibw_arch: riscv64
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_musl }}
            os: ubuntu-latest
            cibw_os: musllinux
            cibw_arch: riscv64
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_glibc }}
            os: ubuntu-latest
            cibw_os: manylinux
            cibw_arch: loongarch64
          
          - condition: ${{ inputs.linux_clangcross && inputs.linux_musl }}
            os: ubuntu-latest
            cibw_os: musllinux
            cibw_arch: loongarch64
          
          # may need to leverage cross-compilation from arm64 in the future, similar to sbuild.yaml
          - condition: ${{ inputs.macos }}
            os: macos-15-intel
            cibw_os: macosx
            cibw_arch: x86_64
          
          # The toolchain supports macOS arm64 natively
          - condition: ${{ inputs.macos }}
            os: macos-latest
            cibw_os: macosx
            cibw_arch: arm64
          
          - condition: ${{ inputs.windows }}
            os: windows-latest
            cibw_target: win_amd64
            cibw_arch: AMD64
          
          # Cross-compile windows ARM64 from amd64 as that's Google's official approach. Native build on ARM64 may also work (see sbuild.yaml) but is less supported and needs a bit of patching.
          # https://cibuildwheel.pypa.io/en/stable/platforms/#windows-arm64
          # Note: build system probably ignores cibuildwheel's cross-compilation env vars, so setting target_cpu in GN config (through pyproject.toml) is key here.
          - condition: ${{ inputs.windows }}
            os: windows-latest
            cibw_target: win_arm64
            cibw_arch: ARM64
          
          # Attempt the same for Windows 32-bit
          - condition: ${{ inputs.windows }}
            os: windows-latest
            cibw_target: win32
            cibw_arch: x86
    
    uses: ./.github/workflows/cibw_one.yaml
    with:
      condition: ${{ matrix.condition }}
      os: ${{ matrix.os }}
      cibw_target: ${{ matrix.cibw_target || format('{0}_{1}', matrix.cibw_os, matrix.cibw_arch) }}
      cibw_arch: ${{ matrix.cibw_arch }}
      cibw_py_ver: ${{ inputs.cibw_py_ver }}
      test_pdfium: ${{ inputs.test_pdfium }}  # currently, linux only
