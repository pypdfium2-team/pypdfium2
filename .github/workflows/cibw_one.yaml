name: CIBW build one
on:
  workflow_call:
    inputs: &reusable_inputs
      os:
        type: string
        required: true
      cibw_target:
        type: string
        required: true
      cibw_arch:
        type: string
        required: true
      cibw_py_ver:
        type: string
        default: 'cp314'
      branch:
        type: string
        default: ''
      repo_tag:
        type: string
        default: ''
      pdfium_ver:
        type: string
        default: ''
      use_sysroot:
        type: boolean
        default: false
      test_pdfium:
        type: boolean
        default: true
      condition:
        type: boolean
        default: true
  workflow_dispatch:
    inputs: *reusable_inputs

jobs:
  
  build:
    name: ${{ inputs.cibw_target }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    if: ${{ inputs.condition }}
    
    steps:
      
      - name: Check out pypdfium2
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref_name }}
      
      - name: Create pypdfium2 tag (optional)
        if: ${{ inputs.repo_tag }}
        run: |
          git config user.email "geisserml@gmail.com"
          git config user.name "geisserml"
          git tag -a "$REPO_TAG" -m "Autorelease"
        env:
          REPO_TAG: ${{ inputs.repo_tag }}
      
      - name: Set up QEMU
        if: ${{ contains(inputs.cibw_target, 'linux') && !(inputs.cibw_arch == 'x86_64' || inputs.cibw_arch == 'aarch64') }}
        uses: docker/setup-qemu-action@v4
      
      - name: Install Windows cross deps
        if: ${{ startsWith(inputs.os, 'windows') && inputs.cibw_arch != 'AMD64' }}
        uses: ChristopheLav/windows-sdk-install@v1
        with:
          version-sdk: 26100
          features: 'OptionId.WindowsDesktopDebuggers'
      
      # Reminder: most configuration is in pyproject.toml so we can use TOML overrides
      - name: Build wheels
        uses: loong64/cibuildwheel@01ca1b55d924c834b3087f3268c0b3ee758ef598  # v4.0.0
        env:
          # Will be tagged as not python specific by our setup.py. inputs.cibw_py_ver only controls the version used at build time.
          # Could also use `*`, then cibuildwheel would build with the oldest supported version, and walk through the others but skip because a compatible wheel is around already.
          CIBW_BUILD: "${{ inputs.cibw_py_ver }}-${{ inputs.cibw_target }}"
          CIBW_ARCHS: "${{ inputs.cibw_arch }}"
          PDFIUM_VER: "${{ inputs.pdfium_ver }}"
          USE_SYSROOT: ${{ inputs.use_sysroot && 1 || 0 }}
          TEST_PDFIUM: "${{ inputs.test_pdfium && 1 || 0 }}"
        with:
          output-dir: wheelhouse
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          name: cibw-${{ inputs.cibw_target }}
      
      # For the rarer Linux architectures, Pillow and Numpy don't currently provide wheels on PyPI. However, Linux distributions do provide packages.
      # Sadly, cibuildwheel isn't really suited for working with system python (cf. https://github.com/pypa/cibuildwheel/discussions/2553)
      # Also, the need to use an older distribution for build (to achieve low glibc requirement) contradicts the desire for a more recent python software stack for testing.
      # So our best bet is to do it by hand:
      
      - name: Post-test
        # x86_64 and aarch64 (manylinux and musllinux) are already handled within cibuildwheel, but doesn't harm to test again in a different container
        if: ${{ contains(inputs.cibw_target, 'linux') }}
        # q&d: suppress known test suite failures on s390x and musllinux_armv7l
        continue-on-error: ${{ inputs.cibw_arch == 's390x' || inputs.cibw_target == 'musllinux_armv7l' }}
        # get_container.py outputs the env vars CONTAINER, PREPARE_CMD, INIT_SHELL and DOCKER_FLAGS
        # The docker command mounts the pypdfium2 repo instead of copying it, i.e. shared among host and container. This seems to work fine on GH actions. Local users might need to add --security-opt label=disable on some distros.
        run: |
          eval "$(python3 ./utils/get_container.py $TARGET)"
          docker run -e PREPARE_CMD -i --rm -v "$PWD:/pypdfium2" $DOCKER_FLAGS "$CONTAINER" $INIT_SHELL /pypdfium2/utils/test_in_docker.sh
        env:
          TARGET: ${{ inputs.cibw_target }}
