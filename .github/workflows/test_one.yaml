name: Test one
on:
  workflow_call:
    inputs:
      runner_os:
        type: string
        required: true
      artifact_id:
        type: string
        required: true
      py_vers:
        type: string
        default: '3.14'
      ref:
        type: string
        default: ''
      docker:
        type: boolean
        default: false

defaults:
  run:
    shell: bash
permissions: {}

jobs:
  test:
    name: Test on ${{ inputs.runner_os }}
    permissions:
      contents: read  # recommended by checkout and setup-python actions
    
    runs-on: ${{ inputs.runner_os }}
    steps:
      
      - name: Check out pypdfium2 (shallow)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref_name }}
      
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ inputs.artifact_id }}
          path: dist/
      
      - name: Prepare
        if: ${{ !inputs.docker }}
        uses: ./.github/actions/prepare_step
        with:
          py_vers: ${{ inputs.py_vers }}
      
      - name: Test on host
        if: ${{ !inputs.docker }}
        run: python3 utils/multitest.py -w dist/*.whl --py-vers $PY_VERS --venv
        env:
          PY_VERS: ${{ inputs.py_vers }}
      
      - name: Set up QEMU
        if: ${{ inputs.docker }}
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      
      - name: Test in container
        if: ${{ inputs.docker }}
        run: ./utils/call_container_driver.sh
