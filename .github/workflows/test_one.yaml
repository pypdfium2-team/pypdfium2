name: Test one
on:
  workflow_call:
    inputs:
      runner_os:
        type: string
        required: true
      artifact_id:
        type: string
        required: true
      py_vers:
        type: string
        default: '3.14'

defaults:
  run:
    shell: bash
permissions: {}

jobs:
  test:
    name: Test on ${{ inputs.runner_os }}
    permissions:
      contents: read  # recommended by checkout and setup-python actions
    
    runs-on: ${{ inputs.runner_os }}
    steps:
      
      - name: Prepare
        uses: ./.github/actions/prepare_step
        with:
          py_vers: ${{ inputs.py_vers }}
      
      - name: Download artifact ${{ inputs.artifact_name }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ inputs.artifact_id }}
          path: dist/
      
      - name: Test ${{ inputs.py_vers }}
        run: python3 utils/multitest.py -w dist/*.whl --py-vers $PY_VERS --venv
        env:
          PY_VERS: ${{ inputs.py_vers }}
