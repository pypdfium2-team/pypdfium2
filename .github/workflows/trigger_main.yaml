# Separate workflow because schedule uses default inputs, and clearly we don't want publish enabled by default

name: Trigger main release
on:
  # NOTE Schedule currently suspended, to preserve PyPI disk space. Manually dispatch releases as needed.
  # # https://github.com/bblanchon/pdfium-binaries/blob/master/.github/workflows/trigger.yml
  # # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
  # # https://crontab.guru/
  # schedule:
  #   - cron: '0 4 10 * *'  # monthly, 10th day
  workflow_dispatch:

jobs:
  # NOTE recently changed to reusable workflow call, let's see if this works. If it does not, we can revert back to benc-uk/workflow-dispatch.
  run_main_release:
    uses: ./.github/workflows/main.yaml
    secrets: inherit  # Anaconda API token (for conda_helpers publish)
    with:
      test: true
      augment: true
      gh_pages: true
      conda: true
      publish: true
