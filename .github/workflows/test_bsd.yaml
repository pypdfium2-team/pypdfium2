name: Test FreeBSD
on:
  workflow_dispatch:

jobs:
  
  freebsd_lo:
    name: Install on FreeBSD with libreoffice pdfium
    runs-on: ubuntu-26.04
    steps:
      
      - name: Check out pypdfium2 (deep)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # for git describe
          persist-credentials: false
      
      - name: Test in FreeBSD VM
        uses: cross-platform-actions/action@5ea7e8e4677bd726033a10b094ba1c5762b15dee # v1.3.0
        with:
          operating_system: freebsd
          version: '15.0'
          architecture: 'x86-64'
          cpu_count: 4
          shell: bash
          sync_files: 'runner-to-vm'  # or true for bi-directional sync
          run: |
            set -x
            # sudo pkg update && sudo pkg upgrade -y
            sudo pkg install -y git libreoffice python3 devel/py-pip devel/py-setuptools graphics/py-pillow math/py-numpy devel/py-pytest
            # ldd /usr/local/lib/libreoffice/program/libpdfiumlo.so
            # ldd /usr/local/lib/libopenjp2.so /usr/local/lib/libabsl_strings.so
            python3 -m pip config set global.break-system-packages true
            # facultative: set LD_PRELOAD just on bindings compile time so library loading will work. at runtime, workaround code in pypdfium2_raw's __init__.py takes over.
            export LD_PRELOAD="/usr/local/lib/libabsl_strings.so:/usr/local/lib/libopenjp2.so"
            python3 -m pip install -v .  # implies PDFIUM_PLATFORM=fallback -> system-search
            unset LD_PRELOAD
            python3 -m pypdfium2 --version
            python3 utils/minitest.py
            # Some APIs are missing from libreoffice-pdfium, suppress known failure
            python3 -m pytest tests/ -sv || true
