name: 'Prepare one'
description: 'Prepare one build (checkout & initial setup)'
inputs:
  # checkout
  ref:
    description: 'Ref to check out. Required.'
    required: true
  assert_sha:
    description: 'Ensure HEAD commit hash matches this value after checkout. Optional'
    default: ''
  replicate_tag:
    description: 'Create the given tag after checkout. Optional.'
    default: ''
  # python
  py_vers:
    description: 'Python versions to set up (space-separated, may be quoted). Optional. If not given, setup-python will not be called.'
    default: ''
  pip_install:
    description: 'Arguments to pip-install input of setup-python. Optional.'
    default: ''

runs:
  using: 'composite'
  steps:
    
    - name: Check out pypdfium2 (deep)
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # for git describe
        persist-credentials: false
        ref: ${{ inputs.ref }}
    
    - name: Confirm commit hash
      if: ${{ inputs.assert_sha }}
      shell: python
      run: |
        import os, sys, subprocess
        p = subprocess.run("git rev-parse HEAD", shell=True, capture_output=True)
        current_sha = p.stdout.decode().strip()
        expected_sha = os.environ["ASSERT_SHA"]
        if expected_sha != current_sha:
            raise Exception(f"Commit hash mismatch: expected {expected_sha!r}, but got {current_sha!r}. This indicates the input ref may have been tampered with, and it would be unsafe to proceed.")
        else:
            print(f"Commit hash confirmed, matches expectation: {current_sha!r}.", file=sys.stderr)
      env:
        ASSERT_SHA: ${{ inputs.assert_sha }}
    
    - name: Create pypdfium2 tag (optional)
      if: ${{ inputs.replicate_tag }}
      shell: bash
      run: |
        git config user.email "geisserml@gmail.com"
        git config user.name "geisserml"
        git tag -a "$REPLICATE_TAG" -m "Autorelease"
      env:
        REPLICATE_TAG: ${{ inputs.replicate_tag }}
    
    - name: Write Python versions
      if: ${{ inputs.py_vers }}
      shell: bash
      run: ./utils/delimit.py $'\n' $PY_VERS > ".python-version"
      env:
        PY_VERS: ${{ inputs.py_vers }}
    
    - name: Set up Python
      if: ${{ inputs.py_vers }}
      uses: actions/setup-python@v6
      with:
        python-version-file: '.python-version'
        pip-install: ${{ inputs.pip_install }}
